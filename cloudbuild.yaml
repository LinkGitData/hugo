steps:
  # Fetch submodules
  - name: 'gcr.io/cloud-builders/git'
    args: ['submodule', 'update', '--init', '--recursive']

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:$COMMIT_SHA', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:latest', '.']
    dir: 'link-blog'

  # Export the built image so Trivy can scan it without relying on Docker socket sharing.
  - name: 'gcr.io/cloud-builders/docker'
    args: ['save', '-o', '/workspace/link-blog-image.tar', 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:$COMMIT_SHA']

  # Fail the pipeline on HIGH/CRITICAL vulnerabilities that already have fixes.
  - name: 'aquasec/trivy:0.68.2'
    entrypoint: 'trivy'
    args:
      - 'image'
      - '--input'
      - '/workspace/link-blog-image.tar'
      - '--scanners'
      - 'vuln'
      - '--severity'
      - 'HIGH,CRITICAL'
      - '--ignore-unfixed'
      - '--exit-code'
      - '1'
      - '--no-progress'

  # Push the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:latest']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'link-blog-service'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:$COMMIT_SHA'
      - '--region'
      - 'us-central1'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:$COMMIT_SHA'
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/link-blog-repo/link-blog:latest'
